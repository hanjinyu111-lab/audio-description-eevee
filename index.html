<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Description</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  text-align: center;
}

#text {
  font-size: 6vw;
  font-weight: bold;
}
</style>

</head>

<body>

<div id="text">TAP TO PLAY</div>

<audio id="audio" preload="auto">
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const text = document.getElementById("text");

function toggleAudio() {
  if (audio.paused) {
    audio.play().then(() => {
      text.innerHTML = "PLAYING...<br>Tap to pause";
    }).catch(err => {
      console.log("Playback failed:", err);
    });
  } else {
    audio.pause();
    text.innerHTML = "PAUSED<br>Tap to play";
  }
}

// 支持手机和电脑
document.addEventListener("click", toggleAudio);
document.addEventListener("touchstart", toggleAudio);
</script>

</body>
</html>
