<!DOCTYPE html>
<html>
<body style="text-align:center;font-family:Arial;margin-top:120px;">

<h2>Audio Description</h2>

<button onclick="playAudio()" style="font-size:24px;padding:20px 40px;">
▶ Play Audio
</button>

<audio id="audio">
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<script>
function playAudio() {
  document.getElementById("audio").play();
}
</script>

</body>
</html>
