<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Description</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  text-align: center;
}

#text {
  font-size: 40px;   /* ⭐ 这里放大字体 */
  font-weight: bold; /* 更清晰 */
  padding: 20px;
}
</style>

</head>

<body>

<div id="text">Tap anywhere to start audio</div>

<audio id="audio" preload="auto">
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const text = document.getElementById("text");

function startAudio() {
  audio.play().then(() => {
    text.innerHTML = "Playing...";
  }).catch(err => {
    text.innerHTML = "Tap again to play";
    console.log("Playback failed:", err);
  });
}

document.addEventListener("click", startAudio, { once: true });
document.addEventListener("touchstart", startAudio, { once: true });
</script>

</body>
</html>
