<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Description</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  text-align: center;
  user-select: none;
}

/* 第一行：Audio Description */
#subtitle {
  font-size: 5vw;
  margin-bottom: 10px;
  opacity: 0.85;
}

/* 第二行：作品名（更大 + 斜体） */
#title {
  font-size: 7vw;
  font-style: italic;
  font-weight: bold;
  margin-bottom: 40px;
}

/* 提示文字 */
#text {
  font-size: 5vw;
  opacity: 0.8;
}
</style>

</head>

<body>

<div id="subtitle">
  Audio Description
</div>

<div id="title">

</div>

<div id="text">
  TAP TO PLAY
</div>

<audio id="audio" preload="auto">
  <source src="audio11.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const text = document.getElementById("text");

function toggleAudio() {
  if (audio.paused) {
    audio.play().then(() => {
      text.innerHTML = "PLAYING...<br>Tap to pause";
    }).catch(err => {
      console.log("Playback failed:", err);
    });
  } else {
    audio.pause();
    text.innerHTML = "PAUSED<br>Tap to play";
  }
}

// 轻触触发
document.addEventListener("pointerdown", toggleAudio);

// 播放结束
audio.addEventListener("ended", () => {
  text.innerHTML = "FINISHED<br>Tap to replay";
});
</script>

</body>
</html>
