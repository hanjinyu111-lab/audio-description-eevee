<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Description</title>

<style>
body {
  margin: 0;
  height: 100vh;

  /* 背景图 */
  background: url("background1.jpg") no-repeat center center fixed;
  background-size: cover;

  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  text-align: center;
  user-select: none;
}

/* ===== 所有文字统一风格 ===== */
#subtitle, #title, #text {
  display: inline-block;

  background: linear-gradient(
    rgba(0,0,0,0.7),
    rgba(0,0,0,0.5)
  );

  padding: 10px 22px;
  border-radius: 16px;

  text-shadow: 0 2px 10px rgba(0,0,0,0.9);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);

  margin: 6px 0;
}

/* 第一行 */
#subtitle {
  font-size: 5vw;
  opacity: 0.9;
}

/* 第二行（标题） */
#title {
  font-size: 7vw;
  font-style: italic;
  font-weight: bold;

  padding: 14px 28px; /* 更突出 */
}

/* 提示文字 */
#text {
  font-size: 5vw;
  opacity: 0.95;

  border-radius: 999px; /* 胶囊形 */
}
</style>

</head>

<body>

<div id="subtitle">
  Audio Description
</div>

<div id="title">
  Andrew Gannon's Sculpture
</div>

<div id="text">
  TAP TO PLAY
</div>

<audio id="audio" preload="auto">
  <source src="audio11.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const text = document.getElementById("text");

function toggleAudio() {
  if (audio.paused) {
    audio.play().then(() => {
      text.innerHTML = "PLAYING...<br>Tap to pause";
    }).catch(err => {
      console.log("Playback failed:", err);
    });
  } else {
    audio.pause();
    text.innerHTML = "PAUSED<br>Tap to play";
  }
}

// 点击触发
document.addEventListener("pointerdown", toggleAudio);

// 播放结束
audio.addEventListener("ended", () => {
  text.innerHTML = "FINISHED<br>Tap to replay";
});
</script>

</body>
</html>
